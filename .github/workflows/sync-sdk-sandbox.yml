name: Sync SDK docs → Sandbox

on:
  push:
    branches: [main]
    paths:
      - "sdk-docs/**/*.md"
      - "tools/sdk-sync/**"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no changes applied)"
        type: boolean
        default: false

concurrency:
  group: sync-sdk-sandbox
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tools/sdk-sync/package-lock.json

      - name: Install dependencies
        working-directory: tools/sdk-sync
        run: npm ci

      - name: Install cs-sync dependencies
        working-directory: tools/cs-sync
        run: npm ci

      - name: Lint SDK docs
        working-directory: tools/sdk-sync
        run: npm run lint -- --base ${{ github.event.before }}

      - name: Sync changed SDK docs
        working-directory: tools/sdk-sync
        env:
          SANDBOX_STACK_API_KEY: ${{ secrets.SDK_API_KEY }}
          SANDBOX_MANAGEMENT_TOKEN: ${{ secrets.SDK_MANAGEMENT_TOKEN }}
          SYNC_DRY_RUN: ${{ inputs.dry_run || 'false' }}
          LOG_LEVEL: info
          MAX_RETRIES: "3"
        run: |
          npm run sync -- \
            --before "${{ github.event.before }}" \
            --after  "${{ github.sha }}"

      - name: Open PR with cms_uid backfill
        # Run even if an unrelated entry failed in the sync step above (Pass 3/usage-guide
        # results are independent of other passes) — just not if the job was cancelled.
        # main is a protected branch and rejects direct pushes, so this opens a PR instead
        # (mirroring the sdk-cms-to-github.yml pull flow) rather than pushing to main directly.
        if: ${{ !cancelled() && inputs.dry_run != true }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git status --porcelain sdk-docs/ | grep -q .; then
            BRANCH="sdk-sync/cms-uid-backfill-$(date -u +%Y%m%d-%H%M%S)"

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            git checkout -b "$BRANCH"
            git add sdk-docs/
            git commit -m "chore: backfill cms_uid for SDK usage guides"
            git push origin "$BRANCH"

            gh pr create \
              --title "chore: backfill cms_uid for SDK usage guides" \
              --body "Auto-generated by the \`sync-sdk-sandbox\` workflow. Links each SDK usage-guide file to its Contentstack entry via a \`cms_uid\` frontmatter field, so future syncs match on that stable id instead of a derived title. No content changes." \
              --base main \
              --head "$BRANCH"
          else
            echo "No cms_uid backfill needed."
          fi

      - name: Notify on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d "{\"text\":\"*SDK Sandbox sync failed* :x:\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
          fi
