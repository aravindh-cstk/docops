name: Sync SDK docs → Sandbox

on:
  push:
    branches: [main]
    paths:
      - "sdk-docs/**/*.md"
      - "tools/sdk-sync/**"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no changes applied)"
        type: boolean
        default: false

concurrency:
  group: sync-sdk-sandbox
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tools/sdk-sync/package-lock.json

      - name: Install dependencies
        working-directory: tools/sdk-sync
        run: npm ci

      - name: Install cs-sync dependencies
        working-directory: tools/cs-sync
        run: npm ci

      - name: Lint SDK docs
        working-directory: tools/sdk-sync
        run: npm run lint -- --base ${{ github.event.before }}

      - name: Sync changed SDK docs
        working-directory: tools/sdk-sync
        env:
          SANDBOX_STACK_API_KEY: ${{ secrets.SDK_API_KEY }}
          SANDBOX_MANAGEMENT_TOKEN: ${{ secrets.SDK_MANAGEMENT_TOKEN }}
          SYNC_DRY_RUN: ${{ inputs.dry_run || 'false' }}
          LOG_LEVEL: info
          MAX_RETRIES: "3"
        run: |
          npm run sync -- \
            --before "${{ github.event.before }}" \
            --after  "${{ github.sha }}"

      - name: Notify on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d "{\"text\":\"*SDK Sandbox sync failed* :x:\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
          fi
