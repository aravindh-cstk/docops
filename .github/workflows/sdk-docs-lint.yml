name: Lint SDK docs

on:
  pull_request:
    branches: [main]
    paths:
      - "sdk-docs/**"

permissions:
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tools/sdk-sync/package-lock.json

      - name: Install dependencies
        working-directory: tools/sdk-sync
        run: npm ci

      - name: Install cs-sync dependencies
        working-directory: tools/cs-sync
        run: npm ci

      - name: Lint documentation
        id: lint
        working-directory: tools/sdk-sync
        continue-on-error: true
        run: |
          if npm run lint -- --base origin/main > /tmp/lint-output.txt 2>&1; then
            echo "LINT_PASSED=true" >> "$GITHUB_ENV"
          else
            echo "LINT_PASSED=false" >> "$GITHUB_ENV"
          fi
          cat /tmp/lint-output.txt

      - name: Post PR comment on failure
        if: env.LINT_PASSED == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/lint-output.txt', 'utf8').trim();
            const body = [
              '## SDK docs lint failed',
              '',
              'Fix the following issues before merging:',
              '',
              '```',
              output,
              '```',
              '',
              '### Required frontmatter',
              '',
              'Every `.md` file under `sdk-docs/` must include:',
              '',
              '```yaml',
              '---',
              'title: "Your Class or Method Name"',
              'doc_type: usage_guide | class_intro | method_details',
              '---',
              '```',
              '',
              '| Field | Rule |',
              '|-------|------|',
              '| `title` | Non-empty string |',
              '| `doc_type` | Must be one of `usage_guide`, `class_intro`, or `method_details` |',
              '',
              'Also ensure the file has a `.md` extension, otherwise it will not be synced.',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if lint errors found
        if: env.LINT_PASSED == 'false'
        run: |
          echo "Lint failed — see errors above and in the PR comment."
          exit 1
