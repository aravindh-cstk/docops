name: Sync APIDocs → Sandbox

on:
  schedule:
    # Runs daily at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no changes applied)"
        type: boolean
        default: false
      skip_export:
        description: "Skip export step (use existing export)"
        type: boolean
        default: false

concurrency:
  group: sync-apidocs-sandbox
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    name: Export → Diff → Sync → Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tools/migration/package-lock.json

      - name: Install dependencies
        working-directory: tools/migration
        run: npm ci

      - name: Export source stack
        if: ${{ !inputs.skip_export }}
        working-directory: tools/migration
        env:
          SOURCE_STACK_API_KEY: ${{ secrets.SOURCE_STACK_API_KEY }}
          SOURCE_STACK_REGION: us
          SOURCE_STACK_BRANCH: main
          DEST_STACK_API_KEY: ${{ secrets.DEST_STACK_API_KEY }}
          DEST_MANAGEMENT_TOKEN: ${{ secrets.DEST_MANAGEMENT_TOKEN }}
          DEST_STACK_REGION: us
          EXPORT_DIR: ./exports
          LOG_LEVEL: info
        run: npm run export

      - name: Diff stacks
        id: diff
        working-directory: tools/migration
        env:
          SOURCE_STACK_API_KEY: ${{ secrets.SOURCE_STACK_API_KEY }}
          SOURCE_STACK_REGION: us
          DEST_STACK_API_KEY: ${{ secrets.DEST_STACK_API_KEY }}
          DEST_MANAGEMENT_TOKEN: ${{ secrets.DEST_MANAGEMENT_TOKEN }}
          DEST_STACK_REGION: us
          EXPORT_DIR: ./exports
          LOG_LEVEL: info
        run: |
          # Exit 2 = changes found, 0 = in sync, 1 = error
          npm run diff || DIFF_EXIT=$?
          if [ "${DIFF_EXIT:-0}" = "2" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          elif [ "${DIFF_EXIT:-0}" = "0" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            exit ${DIFF_EXIT:-1}
          fi

      - name: Sync to destination
        if: steps.diff.outputs.has_changes == 'true'
        working-directory: tools/migration
        env:
          SOURCE_STACK_API_KEY: ${{ secrets.SOURCE_STACK_API_KEY }}
          SOURCE_STACK_REGION: us
          DEST_STACK_API_KEY: ${{ secrets.DEST_STACK_API_KEY }}
          DEST_MANAGEMENT_TOKEN: ${{ secrets.DEST_MANAGEMENT_TOKEN }}
          DEST_STACK_REGION: us
          SYNC_DRY_RUN: ${{ inputs.dry_run || 'false' }}
          EXPORT_DIR: ./exports
          BACKUP_DIR: ./backups
          LOG_LEVEL: info
          MAX_RETRIES: "3"
        run: npm run sync

      - name: Validate sync
        if: steps.diff.outputs.has_changes == 'true' && inputs.dry_run != true
        working-directory: tools/migration
        env:
          SOURCE_STACK_API_KEY: ${{ secrets.SOURCE_STACK_API_KEY }}
          SOURCE_STACK_REGION: us
          DEST_STACK_API_KEY: ${{ secrets.DEST_STACK_API_KEY }}
          DEST_MANAGEMENT_TOKEN: ${{ secrets.DEST_MANAGEMENT_TOKEN }}
          DEST_STACK_REGION: us
          EXPORT_DIR: ./exports
          LOG_LEVEL: info
        run: npm run validate

      - name: Upload diff and validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-reports-${{ github.run_id }}
          path: |
            tools/migration/exports/diffs/
            tools/migration/exports/reports/
          retention-days: 30

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          script: |
            const webhookUrl = process.env.SLACK_WEBHOOK_URL;
            if (!webhookUrl) {
              console.log('SLACK_WEBHOOK_URL not set — skipping notification');
              return;
            }
            const payload = {
              text: `*APIDocs → Sandbox sync failed* :x:\nRun: <${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}|#${context.runId}>`
            };
            await fetch(webhookUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            });
