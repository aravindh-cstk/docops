name: Lint docs

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/**/*.md"
      - "tools/cs-sync/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tools/cs-sync/package-lock.json

      - name: Install dependencies
        working-directory: tools/cs-sync
        run: npm ci

      - name: Lint documentation
        working-directory: tools/cs-sync
        run: npm run lint -- --base origin/main
