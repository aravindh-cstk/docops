name: Sync CMS changes to GitHub

on:
  schedule:
    # Runs every 15 minutes. Looks back 20 minutes to cover any timing gap.
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      lookback_minutes:
        description: "How many minutes back to check for CMS changes"
        default: "20"
        required: false

concurrency:
  group: cms-to-github
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  cms-pull:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tools/cs-sync/package-lock.json

      - name: Install dependencies
        working-directory: tools/cs-sync
        run: npm ci

      - name: Pull changes from CMS
        working-directory: tools/cs-sync
        env:
          CONTENTSTACK_API_KEY: ${{ secrets.CONTENTSTACK_API_KEY }}
          CONTENTSTACK_MANAGEMENT_TOKEN: ${{ secrets.CONTENTSTACK_MANAGEMENT_TOKEN }}
          CONTENTSTACK_ENVIRONMENT: ${{ vars.CONTENTSTACK_ENVIRONMENT }}
          CS_REGION: us
          CS_CONTENT_TYPE: docs_article
        run: npm run cms-pull -- --lookback ${{ inputs.lookback_minutes || '20' }}

      - name: Check for changes
        id: changes
        run: |
          if git status --porcelain cs-docs/ | grep -q .; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changed files:"
            git status --porcelain cs-docs/
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No doc files changed — nothing to PR."
          fi

      - name: Open PR with CMS changes
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="cms-sync/$(date -u +%Y%m%d-%H%M%S)"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add cs-docs/
          git commit -m "chore: sync doc changes from Contentstack CMS"
          git push origin "$BRANCH"

          # Build the PR body with per-file editor info from the summary JSON
          SUMMARY_FILE="tools/cs-sync/.cms-pull-summary.json"

          if [ -f "$SUMMARY_FILE" ]; then
            CHANGES_TABLE=$(node -e "
              const changes = require('./$SUMMARY_FILE');
              const rows = changes.map(c =>
                '| \`' + c.filePath + '\` | ' + c.url + ' | **' + c.updatedByName + '** | ' + new Date(c.updatedAt).toUTCString() + ' |'
              );
              console.log('| File | CMS Entry | Modified By | Modified At |');
              console.log('|------|-----------|-------------|-------------|');
              rows.forEach(r => console.log(r));
            ")
          else
            CHANGED_FILES=$(git diff origin/main..."$BRANCH" --name-only | grep '^cs-docs/' | head -20)
            CHANGES_TABLE="| File | CMS Entry | Modified By | Modified At |
          |------|-----------|-------------|-------------|
          $(echo "$CHANGED_FILES" | sed 's/^/| \`/' | sed 's/$/ \` | — | — | — |/')"
          fi

          gh pr create \
            --title "CMS → GitHub: doc changes detected" \
            --body "## CMS → GitHub sync

          This PR was automatically created because one or more \`docs_article\` entries were edited directly in Contentstack and differ from the current files in \`cs-docs/\`.

          **Review the diff carefully before merging** — in particular check that no content was unintentionally overwritten.

          ### Changes detected
          ${CHANGES_TABLE}

          ---
          _Triggered by the \`cms-to-github\` workflow · $(date -u '+%Y-%m-%d %H:%M UTC')_" \
            --base main \
            --head "$BRANCH"
