name: Sync docs to Contentstack

on:
  push:
    branches: [main]
    paths:
      - "cs-docs/**/*.md"
      - "tools/cs-sync/**"

concurrency:
  group: contentstack-sync
  cancel-in-progress: false

# The sync uploads local images to Assets, rewrites the docs to the CDN URLs, and
# deletes the local files. contents: write lets the bot commit that back to main.
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tools/cs-sync/package-lock.json

      - name: Install dependencies
        working-directory: tools/cs-sync
        run: npm ci

      - name: Sync changed docs to Contentstack
        working-directory: tools/cs-sync
        env:
          CONTENTSTACK_API_KEY: ${{ secrets.CONTENTSTACK_API_KEY }}
          CONTENTSTACK_MANAGEMENT_TOKEN: ${{ secrets.CONTENTSTACK_MANAGEMENT_TOKEN }}
          CONTENTSTACK_ENVIRONMENT: ${{ vars.CONTENTSTACK_ENVIRONMENT }}
          CS_REGION: us
          CS_CONTENT_TYPE: docs_article
        run: npm run sync -- --before "${{ github.event.before }}" --after "${{ github.sha }}"

      # The sync step uploaded any local images to Assets, rewrote the docs to the
      # CDN URLs, and deleted the now-unused local files. Commit that back to main.
      # The `[skip ci]` tag stops this push from re-triggering the workflow.
      # NOTE: if `main` is a protected branch, allow github-actions[bot] to bypass
      # the push restriction (or swap GITHUB_TOKEN for a PAT with that permission).
      - name: Commit image URL rewrites back to main
        run: |
          if git status --porcelain cs-docs/ | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A cs-docs/
            git commit -m "chore: upload local images to Assets and replace paths with CDN URLs [skip ci]"
            git push origin HEAD:main
          else
            echo "No local-image rewrites to commit."
          fi
