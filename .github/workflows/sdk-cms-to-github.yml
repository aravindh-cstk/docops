name: Sync SDK CMS changes → GitHub

on:
  schedule:
    # Runs every 15 minutes. Looks back 20 minutes to cover any timing gap.
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      lookback_minutes:
        description: "How many minutes back to check for CMS changes"
        default: "20"
        required: false

concurrency:
  group: sdk-cms-to-github
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  cms-pull:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tools/sdk-sync/package-lock.json

      - name: Install dependencies
        working-directory: tools/sdk-sync
        run: npm ci

      - name: Install cs-sync dependencies
        working-directory: tools/cs-sync
        run: npm ci

      - name: Pull changes from CMS
        working-directory: tools/sdk-sync
        env:
          SANDBOX_STACK_API_KEY: ${{ secrets.SDK_API_KEY }}
          SANDBOX_MANAGEMENT_TOKEN: ${{ secrets.SDK_MANAGEMENT_TOKEN }}
        run: node sdk-cms-pull.js --lookback ${{ inputs.lookback_minutes || '20' }}

      - name: Auto-fix common style issues
        working-directory: tools/sdk-sync
        run: npm run fix:worktree

      - name: Check for changes
        id: changes
        run: |
          if git status --porcelain sdk-docs/ | grep -q .; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changed files:"
            git status --porcelain sdk-docs/
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No SDK doc files changed — nothing to PR."
          fi

      - name: Create branch and commit
        id: commit
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          BRANCH="sdk-cms-sync/$(date -u +%Y%m%d-%H%M%S)"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add sdk-docs/
          git commit -m "chore: sync SDK doc changes from Contentstack CMS"

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # PRs opened here are authored by github-actions[bot], and this repo's Actions
      # settings gate pull_request-triggered workflow runs from that actor behind a
      # manual approval — meaning sdk-docs-lint.yml would never run (or auto-satisfy
      # the required "lint" status check) without someone clicking approve every time.
      # Run the same lint tool here instead, in a run that's never gated (schedule/
      # workflow_dispatch), and report a "lint" check run directly against the new
      # commit via the Checks API — same check name, no separate approval needed.
      - name: Lint changed docs
        id: lint
        if: steps.changes.outputs.has_changes == 'true'
        working-directory: tools/sdk-sync
        run: |
          if npm run lint -- --base origin/main > /tmp/lint-output.txt 2>&1; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
          fi
          cat /tmp/lint-output.txt

      - name: Report lint check
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CONCLUSION="success"
          if [ "${{ steps.lint.outputs.passed }}" != "true" ]; then
            CONCLUSION="failure"
          fi

          jq -n \
            --arg sha "${{ steps.commit.outputs.sha }}" \
            --arg conclusion "$CONCLUSION" \
            --arg summary "$(head -c 60000 /tmp/lint-output.txt)" \
            '{name: "lint", head_sha: $sha, status: "completed", conclusion: $conclusion,
              output: {title: "SDK docs lint", summary: $summary}}' \
            > /tmp/check-run.json

          gh api "repos/${{ github.repository }}/check-runs" --input /tmp/check-run.json > /dev/null

      - name: Push and open PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.commit.outputs.branch }}"
          git push origin "$BRANCH"

          # Build the PR body with per-file editor info from the summary JSON.
          # Capped at 200 rows — with hundreds/thousands of changed files the full
          # table can exceed the shell's argument-length limit (and GitHub's PR body
          # size limit), so beyond the cap we just point reviewers at the diff instead.
          SUMMARY_FILE="tools/sdk-sync/.cms-pull-summary.json"
          MAX_ROWS=200

          if [ -f "$SUMMARY_FILE" ]; then
            CHANGES_TABLE=$(node -e "
              const changes = require('./$SUMMARY_FILE');
              const maxRows = $MAX_ROWS;
              const rows = changes.slice(0, maxRows).map(c =>
                '| \`' + c.filePath + '\` | ' + c.url + ' | **' + c.updatedByName + '** | ' + new Date(c.updatedAt).toUTCString() + ' |'
              );
              console.log('| File | CMS Entry | Modified By | Modified At |');
              console.log('|------|-----------|-------------|-------------|');
              rows.forEach(r => console.log(r));
              if (changes.length > maxRows) {
                console.log('');
                console.log('_...and ' + (changes.length - maxRows) + ' more file(s) — see the PR diff for the full list._');
              }
            ")
          else
            CHANGED_FILES=$(git diff origin/main..."$BRANCH" --name-only | grep '^sdk-docs/' | head -n "$MAX_ROWS" | sed 's/^/| \`/' | sed 's/$/ \` | — | — | — |/')
            TOTAL_CHANGED=$(git diff origin/main..."$BRANCH" --name-only | grep -c '^sdk-docs/')
            CHANGES_TABLE="| File | CMS Entry | Modified By | Modified At |
          |------|-----------|-------------|-------------|
          $CHANGED_FILES"
            if [ "$TOTAL_CHANGED" -gt "$MAX_ROWS" ]; then
              CHANGES_TABLE="$CHANGES_TABLE

          _...and $((TOTAL_CHANGED - MAX_ROWS)) more file(s) — see the PR diff for the full list._"
            fi
          fi

          PR_BODY_FILE=$(mktemp)
          cat > "$PR_BODY_FILE" <<PRBODY
          ## CMS → GitHub sync: SDK API Reference

          This PR was automatically created because one or more SDK API Reference entries were edited directly in the Contentstack sandbox stack and differ from the current files in \`sdk-docs/\`.

          **Review the diff carefully before merging** — in particular check that no content was unintentionally overwritten.

          ### Changes detected
          ${CHANGES_TABLE}

          ---
          _Triggered by the \`sdk-cms-to-github\` workflow · $(date -u '+%Y-%m-%d %H:%M UTC')_
          PRBODY

          gh pr create \
            --title "CMS → GitHub: SDK doc changes detected" \
            --body-file "$PR_BODY_FILE" \
            --base main \
            --head "$BRANCH"
