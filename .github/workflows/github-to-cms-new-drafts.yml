name: GitHub → CMS new draft entries

on:
  push:
    branches: [main]
    paths:
      - "cs-docs/**/*.md"

concurrency:
  group: github-to-cms-new-drafts
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  create-drafts:
    name: Create CMS draft entries for new .md files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need parent commit to detect added files

      - name: Detect newly added .md files
        id: detect
        run: |
          # --diff-filter=A lists only Added files (not Modified/Deleted)
          NEW=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'cs-docs/**/*.md' 2>/dev/null || true)
          if [ -z "$NEW" ]; then
            echo "No new .md files in this push."
            echo "has_new=false" >> "$GITHUB_OUTPUT"
          else
            echo "New files detected:"
            echo "$NEW"
            echo "has_new=true" >> "$GITHUB_OUTPUT"
            # Pass as multiline env var
            {
              echo "NEW_FILES<<EOF"
              echo "$NEW"
              echo "EOF"
            } >> "$GITHUB_ENV"
          fi

      - uses: actions/setup-node@v4
        if: steps.detect.outputs.has_new == 'true'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tools/cs-sync/package-lock.json

      - name: Install dependencies
        if: steps.detect.outputs.has_new == 'true'
        working-directory: tools/cs-sync
        run: npm ci

      - name: Create draft entries in CMS
        if: steps.detect.outputs.has_new == 'true'
        working-directory: tools/cs-sync
        env:
          CS_API_KEY: ${{ secrets.CONTENTSTACK_API_KEY }}
          CS_MANAGEMENT_TOKEN: ${{ secrets.CONTENTSTACK_MANAGEMENT_TOKEN }}
          CS_REGION: us
          CS_CONTENT_TYPE: ${{ vars.CONTENTSTACK_CONTENT_TYPE || 'docs_article' }}
          CS_LOCALE: en-us
          CS_DOCS_ROOT: cs-docs
          GITHUB_WORKSPACE: ${{ github.workspace }}
          # NEW_FILES is set above in the detect step
        run: npm run create-draft

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          script: |
            const webhookUrl = process.env.SLACK_WEBHOOK_URL;
            if (!webhookUrl) return;
            const payload = {
              text: `*GitHub → CMS draft creation failed* :x:\nPush by: ${{ github.actor }}\nRun: <${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}|#${context.runId}>`
            };
            await fetch(webhookUrl, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });
