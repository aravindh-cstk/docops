name: Sync api-docs to APIDocs Sandbox

on:
  push:
    branches: [main]
    paths:
      - "api-docs/**/*.md"
      - "tools/cs-sync/**"

concurrency:
  group: contentstack-sync-api-docs
  cancel-in-progress: false

jobs:
  sync:
    name: api-docs → APIDocs Sandbox (all changes as drafts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tools/cs-sync/package-lock.json

      - name: Install dependencies
        working-directory: tools/cs-sync
        run: npm ci

      - name: Sync changes to APIDocs Sandbox
        working-directory: tools/cs-sync
        env:
          CS_API_KEY: ${{ secrets.APIDOCS_SANDBOX_STACK_API_KEY }}
          CS_MANAGEMENT_TOKEN: ${{ secrets.APIDOCS_SANDBOX_MANAGEMENT_TOKEN }}
          CS_REGION: us
          CS_LOCALE: en-us
          CS_DOCS_ROOT: api-docs
        run: npm run sync:api-docs -- --before "${{ github.event.before }}" --after "${{ github.sha }}"

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          script: |
            const webhookUrl = process.env.SLACK_WEBHOOK_URL;
            if (!webhookUrl) return;
            await fetch(webhookUrl, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                text: `*api-docs → APIDocs Sandbox sync failed* :x:\nPush by: ${{ github.actor }}\nRun: <${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}|#${context.runId}>`
              }),
            });
